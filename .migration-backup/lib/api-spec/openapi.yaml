openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: VOYA SaaS Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: categories
    description: Categories and sub-categories
  - name: campaigns
    description: Campaign management
  - name: influencers
    description: Influencer profiles
  - name: partners
    description: Partner profiles
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register-partner:
    post:
      operationId: registerPartner
      tags: [auth]
      summary: Register a new partner account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPartnerInput"
      responses:
        "201":
          description: Partner registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register-influencer:
    post:
      operationId: registerInfluencer
      tags: [auth]
      summary: Register a new influencer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInfluencerInput"
      responses:
        "201":
          description: Influencer registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenInput"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and invalidate refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenInput"
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories with sub-categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryWithSubs"

  /campaigns/public:
    get:
      operationId: listPublicCampaigns
      tags: [campaigns]
      summary: List active campaigns (for influencers)
      security:
        - bearerAuth: []
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: level
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignListResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterPartnerInput:
      type: object
      required: [email, password, companyName, managerName, phone, country]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        companyName:
          type: string
        managerName:
          type: string
        phone:
          type: string
        country:
          type: string
        address:
          type: string
        website:
          type: string
        description:
          type: string

    RegisterInfluencerInput:
      type: object
      required: [email, password, fullName, country]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        fullName:
          type: string
        phone:
          type: string
        country:
          type: string
        bio:
          type: string
        tiktokUrl:
          type: string
        tiktokFollowers:
          type: integer
        instagramUrl:
          type: string
        instagramFollowers:
          type: integer
        facebookUrl:
          type: string
        facebookFollowers:
          type: integer
        youtubeUrl:
          type: string
        youtubeFollowers:
          type: integer

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshTokenInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"

    UserProfile:
      type: object
      required: [id, email, role, status]
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
        status:
          type: string
        profile:
          type: object
          additionalProperties: true

    MeResponse:
      type: object
      required: [id, email, role, status]
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
        status:
          type: string
        profile:
          type: object
          additionalProperties: true

    CategoryWithSubs:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        icon:
          type: ["string", "null"]
        subCategories:
          type: array
          items:
            $ref: "#/components/schemas/SubCategory"

    SubCategory:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string

    CampaignListResponse:
      type: object
      required: [campaigns, total, page, limit]
      properties:
        campaigns:
          type: array
          items:
            $ref: "#/components/schemas/CampaignSummary"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    CampaignSummary:
      type: object
      required: [id, title, description, commissionModel, commissionAmount, minInfluencerLevel, status]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: ["string", "null"]
        commissionModel:
          type: string
        commissionAmount:
          type: string
        minInfluencerLevel:
          type: string
        status:
          type: string
        category:
          type: ["string", "null"]
        partnerName:
          type: string
